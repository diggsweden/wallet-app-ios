# Release Dev Workflow
#
# This workflow builds the iOS app and uploads to TestFlight for testing.
# Triggered manually via workflow_dispatch (GitHub Actions UI).
#
# How to use:
# 1. Go to Actions tab in GitHub
# 2. Select "Release Dev Workflow"
# 3. Click "Run workflow"
# 4. Select branch to build from
# 5. Click "Run workflow"
#
# Created artifacts:
# - IPA uploaded to TestFlight

name: Release Dev Workflow

on:
  workflow_dispatch:

concurrency:
  group: release-dev-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-number:
    uses: ./.github/workflows/compute-build-number.yml
    permissions:
      contents: read

  build:
    needs: build-number
    uses: diggsweden/reusable-ci/.github/workflows/build-xcode-ios.yml@d31c989acd139c3e8754e116496c826af8dbbca0 # v2.8.2
    permissions:
      contents: read
    secrets: inherit
    with:
      reusable-ci-ref: d31c989acd139c3e8754e116496c826af8dbbca0
      xcode-version: "26.2"
      scheme: "Wallet Demo"
      workspace: "Wallet.xcworkspace"
      configuration: Release
      enable-code-signing: true
      export-options-var: EXPORT_OPTIONS_BASE64
      artifact-name: wallet-ios-demo-dev
      include-tag: false
      build-number: ${{ needs.build-number.outputs.value }}
      use-xcodegen: true

  upload-testflight:
    needs: build
    uses: diggsweden/reusable-ci/.github/workflows/publish-apple-appstore.yml@d31c989acd139c3e8754e116496c826af8dbbca0 # v2.8.2

    permissions:
      contents: read
    secrets: inherit
    with:
      reusable-ci-ref: d31c989acd139c3e8754e116496c826af8dbbca0
      ipa-artifact-name: wallet-ios-demo-dev
      submit-for-review: false
      skip-validation: false
