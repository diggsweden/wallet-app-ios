name: Pull Request Workflow

on:
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pr-checks:
    uses: diggsweden/reusable-ci/.github/workflows/pullrequest-orchestrator.yml@d31c989acd139c3e8754e116496c826af8dbbca0 # v2.8.2
    permissions:
      contents: read
      packages: read
      security-events: write
    secrets: inherit
    with:
      reusable-ci-ref: d31c989acd139c3e8754e116496c826af8dbbca0
      project-type: xcode-ios
      linters.devbasecheck: true
      linters.megalint: false
      linters.commitlint: false
      linters.licenselint: false
      linters.dependencyreview: true
      linters.swiftformat: true
      linters.swiftlint: true

  unit-tests:
    runs-on: ${{ vars.MACOS_VERSION || 'macos-26' }}
    needs: pr-checks
    if: always()
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-env
        with:
          xcode-version: ${{ vars.XCODE_VERSION || '26.4' }}

      - name: Run unit tests
        run: |
          set -o pipefail
          xcodebuild test \
            -scheme WalletTests \
            -destination 'platform=iOS Simulator,name=iPhone 17' \
            -enableCodeCoverage YES \
            -resultBundlePath TestResults.xcresult \
          | xcbeautify

      - name: Generate coverage report
        if: always()
        run: |
          xcrun xccov view --report TestResults.xcresult > coverage.txt
          xcrun xccov view --report --json TestResults.xcresult > coverage.json
          {
            echo "## 📊 Code Coverage"
            echo ""
            echo '```'
            head -50 coverage.txt
            echo '```'
            echo "_Full report available as workflow artifact._"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: |
            coverage.txt
            coverage.json
  
