name: Pull Request Workflow

on:
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pr-checks:
    uses: diggsweden/reusable-ci/.github/workflows/pullrequest-orchestrator.yml@d31c989acd139c3e8754e116496c826af8dbbca0 # v2.8.2
    permissions:
      contents: read
      packages: read
      security-events: write
    secrets: inherit
    with:
      reusable-ci-ref: d31c989acd139c3e8754e116496c826af8dbbca0
      project-type: xcode-ios
      linters.devbasecheck: true
      linters.megalint: false
      linters.commitlint: false
      linters.licenselint: false
      linters.dependencyreview: true
      linters.swiftformat: true
      linters.swiftlint: true

  unit-tests:
    runs-on: ${{ vars.MACOS_VERSION || 'macos-26' }}
    needs: pr-checks
    if: always()
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-env
        with:
          xcode-version: ${{ vars.XCODE_VERSION || '26.4' }}

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Run unit tests
        run: |
          set -o pipefail
          rm -rf TestResults.xcresult
          xcodebuild test \
            -workspace Wallet.xcworkspace \
            -scheme WalletTests \
            -destination 'platform=iOS Simulator,name=iPhone 17' \
            -resultBundlePath TestResults.xcresult \
          | xcbeautify

      - name: Generate coverage report
        if: always()
        run: |
          if [ ! -d TestResults.xcresult ]; then
            echo "⚠️ No TestResults.xcresult - skipping coverage report ⚠️"
            exit 0
          fi

          
          xcrun xccov view --report TestResults.xcresult \
            | grep -E '^[A-Za-z]|^    /' \
          > coverage-files.txt

          xcrun xccov view --report --json TestResults.xcresult > coverage.json

          grep -E '^[A-Za-z]|^    /' coverage.txt > coverage-files.txt

          {
            echo "## 📊 Code Coverage"
            echo ""
            echo '```'
            head -60 coverage-files.txt
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload coverage report
        if: always() && hashFiles('coverage-files.txt') != ''
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: |
            coverage-files.txt
            coverage.json

