name: Pull Request Workflow

on:
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pr-checks:
    uses: diggsweden/reusable-ci/.github/workflows/pullrequest-orchestrator.yml@617cb32268cb6aefdfa4117b4159d37e3b47d7b3 # v2.8.3
    permissions:
      contents: read
      packages: read
      security-events: write
    secrets: inherit
    with:
      reusable-ci-ref: d31c989acd139c3e8754e116496c826af8dbbca0
      project-type: xcode-ios
      linters.devbasecheck: true
      linters.megalint: false
      linters.commitlint: false
      linters.licenselint: false
      linters.dependencyreview: true
      linters.swiftformat: true
      linters.swiftlint: true

  unit-tests:
    runs-on: ${{ vars.MACOS_VERSION || 'macos-26' }}
    needs: pr-checks
    if: always()
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0
      - uses: ./.github/actions/setup-env
        with:
          xcode-version: ${{ vars.XCODE_VERSION || '26.4' }}

      - name: Check PR branch is up to date
        shell: bash
        env:
          BASE_REF: ${{ github.base_ref }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          git fetch origin "$BASE_REF" --depth=1

          BASE="origin/$BASE_REF"
          HEAD="$HEAD_SHA"

          if ! git merge-base --is-ancestor "$BASE" "$HEAD"; then
            echo "::error:: This PR branch is stale. Rebase or merge $BASE_REF before running build and tests."
            exit 1
          fi

      - name: Run Xcode tests
        uses: ./.github/actions/xcode-test

      - name: Generate and upload coverage report
        if: always()
        uses: ./.github/actions/xcode-coverage-report
        with:
          xcresult-path: TestResults.xcresult
          artifact-name: coverage-report

