name: OpenSSF Scorecard analysis
on:
  push:
    branches:
      - main
  schedule:
    # Weekly.
    - cron: "30 1 * * 5"

permissions:
  contents: read

jobs:
  scorecard-analysis:
    permissions:
      contents: read
      security-events: write
      id-token: write
    uses: diggsweden/reusable-ci/.github/workflows/security-openssf-scorecard.yml@1e3141deda57eba0e4a9e122b015862c738a2dfb # v2.7.8
