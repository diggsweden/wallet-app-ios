name: Refresh Xcode Cache

permissions:
  contents: read
  actions: write

on:
  push:
    branches:
      - main

jobs:
  refresh-xcode-cache:
    runs-on: ${{ vars.MACOS_VERSION }}

    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0
      - uses: ./.github/actions/setup-env
        with:
          xcode-version: ${{ vars.XCODE_VERSION || '26.4' }}

      - name: Build Xcode
        uses: ./.github/actions/xcode-build
        with:
          should-restore-xcode-cache: "true"

      - name: Refresh or save Xcode cache
        if: success()
        uses: ./.github/actions/xcode-cache-save
