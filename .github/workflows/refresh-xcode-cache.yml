name: Refresh Xcode Cache

permissions:
  contents: read
  actions: write

on:
  push:
    branches:
      - main

jobs:
  refresh-xcode-cache:
    runs-on: ${{ vars.MACOS_VERSION }}

    steps:
      - name: Checkout
        uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6.1.0
        with:
          fetch-depth: 0
      - uses: ./.github/actions/setup-env
        with:
          xcode-version: ${{ vars.XCODE_VERSION || '26.4' }}

      - name: Build Xcode
        uses: ./.github/actions/xcode-build

      - name: Refresh or save Xcode cache
        if: success()
        uses: ./.github/actions/xcode-cache-save
