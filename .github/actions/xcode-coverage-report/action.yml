name: Xcode Coverage Report
description: Generate and upload an Xcode coverage report from an xcresult bundle

inputs:
  xcresult-path:
    description: Path to the xcresult bundle
    required: true

  artifact-name:
    description: Name of the uploaded coverage artifact
    required: true

runs:
  using: composite
  steps:
    - name: Generate coverage report
      shell: bash
      env:
        XCRESULT_PATH: ${{ inputs.xcresult-path }}
      run: |
        if [ ! -d "$XCRESULT_PATH" ]; then
          echo "⚠️ No $XCRESULT_PATH - skipping coverage report ⚠️"
          exit 0
        fi

        xcrun xccov view --report "$XCRESULT_PATH" \
          | grep -E '^[A-Za-z]|^    /' \
          > coverage-files.txt

        xcrun xccov view --report --json "$XCRESULT_PATH" > coverage.json

        {
          echo "## 📊 Code Coverage"
          echo ""
          echo '```'
          head -60 coverage-files.txt
          echo '```'
        } >> "$GITHUB_STEP_SUMMARY"

    - name: Upload coverage report
      if: hashFiles('coverage-files.txt') != ''
      uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
      with:
        name: ${{ inputs.artifact-name }}
        path: |
          coverage-files.txt
          coverage.json
