name: Xcode Cache (restore)
description: Restore Xcode build cache and set up file mtimes for incremental builds

runs:
  using: composite
  steps:
    - name: Restore Xcode DerivedData cache
      uses: actions/cache/restore@v4
      with:
        path: |
          Wallet.xcodeproj
          .xcodegen/cache
          ~/Library/Developer/Xcode/DerivedData
          ~/Library/Caches/org.swift.swiftpm
          ~/Library/org.swift.swiftpm
        key: xcode-${{ runner.os }}-${{ runner.arch }}-${{ github.sha }}
        restore-keys: |
          xcode-${{ runner.os }}-${{ runner.arch }}-

    - name: Restore mtimes from git history
      shell: bash
      run: |
        git ls-files -z | while IFS= read -r -d '' f; do
          ts=$(git log -1 --format=%cd --date=format-local:%Y%m%d%H%M.%S -- "$f")
          [ -n "$ts" ] && touch -t "$ts" "$f"
        done
